<div class="card mb-4">
  <div class="card-body">
    <h5 class="card-title">Nueva Ciudad</h5>

    <div class="mb-3">
      <label class="form-label">Nombre de la Ciudad</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="cityName"
        placeholder="Nombre de la Ciudad">
    </div>

    <div class="mb-3">
      <label class="form-label">País</label>
      <select class="form-select" [(ngModel)]="selectedCountryId">
        <option [value]="null" disabled>Seleccionar País</option>
        <option *ngFor="let country of countries" [value]="country.id">
          {{ country.name }}
        </option>
      </select>
    </div>

    <div class="d-flex gap-2">
      <button
        class="btn btn-success"
        [disabled]="!cityName || !selectedCountryId"
        (click)="onSave()">
        Guardar
      </button>
      <button class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
    </div>
  </div>
</div>
