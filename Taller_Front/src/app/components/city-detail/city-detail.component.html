<div class="card mt-3">
  <div class="card-header">
    <h5 class="mb-0">Detalle de Ciudad — {{ city.name }}, {{ city.country.name }}</h5>
  </div>
  <div class="card-body">

    <!-- TODO HU-03: Muestra un spinner mientras se carga el clima (usa la propiedad loading) -->

    <!-- TODO HU-03: Muestra los datos de clima cuando estén disponibles:
         - Temperatura: weatherDetail.temp_c °C
         - Condición: weatherDetail.condition
         - Humedad: weatherDetail.humidity %
    -->

    <!-- TODO HU-03: Muestra un mensaje "No hay datos de clima disponibles" cuando no haya datos -->

    <p class="text-muted mb-0">Clima no disponible.</p>

  </div>
</div>

<div class="card mt-3">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Historial de Clima</h5>
    <button class="btn btn-sm btn-primary" (click)="saveWeather()">Guardar Clima Actual</button>
  </div>
  <div class="card-body p-0">

    <div *ngIf="weatherRecords.length === 0" class="p-3">
      <p class="text-muted mb-0">No hay registros de clima para esta ciudad.</p>
    </div>

    <table *ngIf="weatherRecords.length > 0" class="table table-sm table-striped mb-0">
      <thead class="table-dark">
        <tr>
          <th>Fecha y Hora</th>
          <th>Temp (°C)</th>
          <th>Condición</th>
          <th>Humedad (%)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of weatherRecords">
          <td>{{ r.recordedAt | date:'dd/MM/yyyy HH:mm' }}</td>
          <td>{{ r.tempC }}</td>
          <td>{{ r.condition }}</td>
          <td>{{ r.humidity }}</td>
        </tr>
      </tbody>
    </table>

  </div>
</div>
